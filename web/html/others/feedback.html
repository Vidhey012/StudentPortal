<html>
<style>
body::-webkit-scrollbar { display: none; }
.a{width: 100%;  height: 100%;  overflow: auto;}
body{overflow-y:scroll;}

body {font-family: Arial, Helvetica, sans-serif;}

/* Full-width input fields */
input[type=text], input[type=password],textarea {
  width: 100%;
  padding: 12px 20px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

/* Set a style for all buttons */
button {
  background-color: #4CAF50;
  color: white;
  padding: 14px 20px;
  margin: 8px 0;
  border: none;
  cursor: pointer;
  width: 100%;
}

button:hover {
  opacity: 0.8;
}


/* Center the image and position the close button */
.imgcontainer {
  text-align: center;
  margin: 24px 0 12px 0;
  position: relative;
}

img.avatar {
  width: 40%;
  border-radius: 50%;
}

.container {
  padding: 16px;
}

span.psw {
  float:left;
  padding-top: 16px;
}

/* The Modal (background) */
.modal {
  display: none; /* Hidden by default */
  position: fixed; /* Stay in place */
  z-index: 1; /* Sit on top */
  left: 0;
  top: 0;
  width: 100%; /* Full width */
  height: 100%; /* Full height */
  overflow: auto; /* Enable scroll if needed */
  background-color: rgb(0,0,0); /* Fallback color */
  background-color: rgba(0,0,0,0.4); /* Black w/ opacity */
  padding-top: 60px;
}

/* Modal Content/Box */
.modal-content {
  background-color: #fefefe;
  margin: 5% auto 15% auto; /* 5% from the top, 15% from the bottom and centered */
  border: 1px solid #888;
  width: 50%; /* Could be more or less, depending on screen size */
}



/* Add Zoom Animation */
.animate {
  -webkit-animation: animatezoom 0.6s;
  animation: animatezoom 0.6s
}

@-webkit-keyframes animatezoom {
  from {-webkit-transform: scale(0)} 
  to {-webkit-transform: scale(1)}
}
  
@keyframes animatezoom {
  from {transform: scale(0)} 
  to {transform: scale(1)}
}

</style>
<br><br>
<body class="a">
<div  id="regid" data-ng-controller="RegistrationController" >

<div id="id01">
  
  <form class="modal-content animate" style="border-radius:50px; background-image:url('/Student_Portal/graphics/Bgi5.jpg')">
    

    <div class="container">
      <h4><b>&nbsp;&nbsp;Name :</b></h4>
      <input type="text" placeholder="&nbsp;&nbsp;&nbsp;Enter your Name" data-ng-model="data.object.name" pattern="[a-zA-Z0-9/\s]{3,15}"  required style="border-radius:50px;">

      <h4><b>&nbsp;&nbsp;Email Id :</b></h4>
      <input type="text" placeholder="&nbsp;&nbsp;&nbsp;Enter your Email id" data-ng-model="data.object.email" required style="border-radius:50px;"  pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">
     <h4><b>&nbsp;&nbsp;Message :</b></h4>
      <textarea placeholder="&nbsp;&nbsp;&nbsp;Enter Your Feedback Or Query.."  rows="6" cols="100" required style="border-radius:50px;" minlength="5" data-ng-model="data.object.feedback" >
                                    
      </textarea>
      
     <input type="text" data-ng-model="data.object.status" style="display:none;">
     <input type="text" data-ng-model="data.object.reply" style="display:none;">
      <button type="submit" style="border-radius:50px;" data-ng-click="insertFeedback(data.object);">Send Message</button>
      
    </div>
  </form>
</div>

</div>
<script>
	
		jQuery(document).ready(function() {
			var currentPage='f';
			localStorage.setItem("currentPage",currentPage);
			angular.bootstrap(jQuery("#regid"), [ 'RegistrationModule' ]);
		});
		
</script>
</body>
</html>
