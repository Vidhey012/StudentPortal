<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<style>
input,select,option { 
    text-align: center; 
}

.form-control{
display:inline;
}
.a{width: 100%;  height: 100%;  overflow: auto;}
.a::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<br/><br/><br/>
<div  id="regid" data-ng-controller="RegistrationController" class="a">
<div class="row">

<div class="col-12 text-center">

<input type="text" placeholder="Ex : 18030"  class="form-control" data-ng-model="data.object.stu_pin1" style="width:200px;border-radius:50px;"  pattern="[0-9]{2,}[0]{1}[3]{1}[0]{1}" required>

&nbsp;

<select class="form-control"  data-ng-model="data.object.stu_pin2" style="width:200px;border-radius:50px;" required>
   <option value="" selected disabled>Select Branch</option>
   <option data-ng-repeat="branch in branchdetails" data-ng-value="branch.branchcode">{{branch.branchcode}} </option>
</select>

&nbsp;

<input type="text"  placeholder="Ex : 012" class="form-control" data-ng-model="data.object.stu_pin3" style="width:200px;border-radius:50px;"  pattern="[0-9]{1,4}"required>

&nbsp;


	<select class="form-control" data-ng-model="data.object.sem"  style="width:200px;border-radius:50px;" required>
           <option value="" selected disabled>Select Semester</option>			
		   <option data-ng-repeat="x in semdetails" data-ng-value="{{x.sem}}">{{x.sem}}</option>
    </select>

&nbsp;

<button type="submit" class="btn btn-primary" data-ng-click="viewIndividualStudentMarks(data.object);" style="border-radius:50px;" data-target="#internals" id="i">Internals</button>



</div>
</div>
			<div  id="internals"  style="display:none;">
				<div class="modal-dialog modal-lg">
					<div class="modal-content" style="background-image:url('/Student_Portal/graphics/form_bg1.jpg'); color:white;">
						<div class="modal-header">
						<h4 class="modal-title">Marks</h4>
						</div>
						<div class="modal-body">
							<div class="panel panel-success">
								<div class="panel-body">
								    <div class="row  text-center">
										<div class="col-12">
											<table class="table table-bordered" style="text-align:center; color:white;">
												<tr>
													<th>Student id</th>
													<th>Semester</th>
													<th>Subject</th>
													<th>Mid 1</th>	
													<th>Mid 2</th>	
													<th id="m3">Mid 3</th>		
											     </tr>
												<tr data-ng-repeat="y in individualstudentmarks">
												<td>{{y.stu_pin1}}-{{y.stu_pin2}}-{{y.stu_pin3}}</td>
												<td>{{y.sem}}</td>
												<td>{{y.subject}}</td>
												<td>{{y.mid1}}</td>
												<td>{{y.mid2}}</td>
												<td id="m3" data-ng-hide="y.sem!='1'">{{y.mid3}}</td>
												<td data-ng-hide="y.sem=='1'">-</td>
												</tr>
											</table>
										</div>
									</div>
								</div>
							</div>
						</div>

					</div>
				</div>
			</div>
<br><br>
<div class="row mb-5">

<div class="col-12 text-center">

<input type="text" placeholder="Ex : 18030" class="form-control" data-ng-model="data.object1.stu_pin1" style="width:120px; border-radius:50px;"  pattern="[0-9]{2,}[0]{1}[3]{1}[0]{1}" required>

&nbsp;

<select class="form-control"  data-ng-model="data.object1.stu_pin2" style="width:200px;border-radius:50px;" required>
   <option value="" selected disabled>Select Branch</option>
   <option data-ng-repeat="branch in branchdetails" data-ng-value="branch.branchcode">{{branch.branchcode}} </option>
</select>

&nbsp;

<input type="text"  placeholder="Ex : 012" class="form-control" data-ng-model="data.object1.stu_pin3" style="width:105px;border-radius:50px;"  pattern="[0-9]{1,4}"required>

&nbsp;

<input type="date" data-ng-model="data.object1.sdate" style="width:170px;border-radius:50px;" class="form-control" required>

&nbsp;

<input type="date" data-ng-model="data.object1.edate" style="width:170px;border-radius:50px;" class="form-control" required>
			

&nbsp;

<button type="submit" class="btn btn-warning" data-ng-click="viewIndividualStudentAttendance(data.object1);" style="border-radius:50px;" 
 data-target="#attendance" id="a">Attendance</button>

</div>
</div>

<div class="row">
<div class="col-12 text-center">

<div  id="attendance" style="display:none;">
				<div class="modal-dialog modal-lg">
					<div class="modal-content" style="background-image:url('/Student_Portal/graphics/form_bg1.jpg'); color:white;">
						<div class="modal-header">
						<h4 class="modal-title">Attendance</h4>
						</div>
						<div class="modal-body">
							<div class="panel panel-success">
								<div class="panel-body">
								    <div class="row  text-center">
										<div class="col-12">
											<table class="table table-bordered" style="text-align:center; color:white;">
												<tr>
												    <th>Date</th>
													<th>Attendance</th>
												</tr>
												<tr data-ng-repeat="x in individualstudentattendance">
												<td><input type="date" data-ng-model="x.date" class="form-control" style="border-radius:50px; color:black; background-color:yellow;" disabled> </td>
												<td><input type="text" data-ng-model="x.attendance" class="form-control" style="border-radius:50px; background-color:lime; color:black;" data-ng-show="x.attendance=='Present'" disabled>
												<input type="text" data-ng-model="x.attendance" class="form-control" style="border-radius:50px; background-color:orange; color:black;" data-ng-show="x.attendance=='Absent'" disabled>
												<input type="text" data-ng-model="x.attendance" class="form-control" style="border-radius:50px; background-color:red; color:white;" data-ng-show="x.attendance=='Attendance Not Inserted'" disabled>
												<input type="text" data-ng-model="x.attendance" class="form-control" style="border-radius:50px; background-color:aqua; color:black;" data-ng-show="(x.attendance!='Present')&&(x.attendance!='Attendance Not Inserted')&&(x.attendance!='Absent')" disabled></td>
												</tr>
											</table>
										</div>
									</div>
								</div>
							</div>
						</div>

					</div>
				</div>
			</div>

         </div>
     </div>
</div><br><br>
<script>
		jQuery(document).ready(function() {
			var currentPage='c';
			localStorage.setItem("currentPage",currentPage);
		    $('#a').click(function() {
		        $('#attendance').toggle("slide");
		      });
		    $('#i').click(function() {
		        $('#internals').toggle("slide");
		      });
			angular.bootstrap(jQuery("#regid"), [ 'RegistrationModule' ]);
			
		});
		
</script>


</body>
</html>
